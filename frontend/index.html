    <!-- ═══════════════════════════════════════════════════════════════════
         GOOGLE CONSENT MODE v2 — DEBE IR ANTES QUE EL TAG DE GA4
         ───────────────────────────────────────────────────────────────────
         Estrategia:
           1. Default: analytics_storage = "denied"
              → GA carga pero NO guarda cookies ni PII.
              → Google usa modelado estadístico (cookieless pings) para
                estimar conversiones incluso sin consentimiento.

           2. Si el usuario ya aceptó en una sesión anterior (localStorage),
              se activa "granted" ANTES de que GA inicialice → sesión completa.

           3. Si acepta en el banner actual, PrivacyBanner.jsx llama a
              gtag('consent','update', {analytics_storage:'granted'})
              → GA cambia de modo sin recargar la página.

         Esto cumple: GDPR Art.7, ePrivacy Directive, IAB TCF v2.2 y los
         requisitos de Consent Mode v2 de Google (marzo 2024).
         ═══════════════════════════════════════════════════════════════════ -->
    <script>
      // Inicializar dataLayer y gtag helper
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }

      // Paso 1 — Consent por defecto: todo denegado
      gtag('consent', 'default', {
        'analytics_storage':   'denied',
        'ad_storage':          'denied',
        'ad_user_data':        'denied',
        'ad_personalization':  'denied',
        'wait_for_update': 400         // ms que GA espera antes de disparar hits
      });

      // Paso 2 — Si ya consintió en sesión anterior, restaurar inmediatamente
      try {
        if (localStorage.getItem('cosafe_privacy_accepted') === '1') {
          gtag('consent', 'update', { 'analytics_storage': 'granted' });
        }
      } catch(e) { /* localStorage bloqueado — continúa en modo denegado */ }
    </script>

    <!-- GA4 — carga asíncrona, no bloquea render -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H69B5KN36G"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-H69B5KN36G', {
        // Anonimizar IP (buena práctica, requerido bajo GDPR si analytics_storage=granted)
        'anonymize_ip': true,
        // No enviar page_view automático — lo manejamos via React Router
        'send_page_view': false
      });
    </script>
